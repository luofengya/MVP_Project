  raw_text_file_template: "{doc_id}.jsonl"
  clean_text_file_template: "{doc_id}.jsonl"

mvp_scope:
  enabled_doc_types:
    - "operating_manual"
    - "compact_manual"
    - "getting_started"
    - "fault_page"
    - "comm_page"
    - "case_page"

  priority_topics:
