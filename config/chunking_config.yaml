    - "报警码解释"
    - "快速调试"
    - "连接宏"
    - "应用宏"
    - "Modbus通讯"
    - "参数读写"

  defer_topics:
    - "复杂表格抽取"
    - "跨文档自动对齐"
    - "英文补充库混合召回"
    - "图片OCR"
    - "高级重排序"